version: 2.1
orbs:
  ruby-rails: sul-dlss/ruby-rails@4.8.0
workflows:
  build:
    jobs:
      - ruby-rails/validate-api:
          name: validate
      - ruby-rails/lint:
          name: lint
          context: dlss
      - ruby-rails/lint-erb:
          context: dlss
      - ruby-rails/test-rails:
          name: test
          context: dlss
          api-only: true
          db-prepare-command: db:reset
          executor: ruby-rails/ruby-postgres-redis
          before-test:
            - run: sudo apt-get update -y
            - run: sudo apt-get install -y 7zip
            - run: cd /home/circleci/.local/bin && ln -s `which 7zz` 7z && ls -lah
            - run: 7z -h # just some debugging output in case the installation went awry
